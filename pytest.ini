[pytest]
markers =
    resiliency_retry_then_success: Tests verifying retry policy succeeds after retryable failures
    resiliency_non_retryable: Tests verifying retry policy stops immediately on non-retryable errors
    continuity_telemetry_happy: Tests verifying telemetry extraction and quality scoring happy path
    continuity_telemetry_strict_gate: Tests verifying strict-mode gate validation with violations
    workbench_apply_vendor_continuity: Tests verifying workbench apply with vendor continuity selection
    workbench_apply_drift_conflict: Tests verifying workbench detects and blocks manifest drift conflicts
    step4: Tests covering Step4 asset resolution and pixelle routing
    legacy_provider_mode: Tests covering legacy provider path behavior

